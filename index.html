<!DOCTYPE html>
<html>
<head>
<title>Property Deal Scanner</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}
.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}
.score{
font-size:32px;
color:#00ff9c;
}
</style>
</head>

<body>

<h1>Property Deal Scanner</h1>

<div class="card">
<h2>Camden Flat</h2>
<p>Price: £510,000</p>
<p>Size: 520 sqft</p>
<p>Strategy: Short Lease Arbitrage</p>
<p class="score">Deal Score: 88</p>
</div>

<div class="card">
<h2>Battersea Flat</h2>
<p>Price: £590,000</p>
<p>Size: 640 sqft</p>
<p>Strategy: Refurb Opportunity</p>
<p class="score">Deal Score: 84</p>
</div>

</body>
</html>
