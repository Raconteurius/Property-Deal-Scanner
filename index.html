<!DOCTYPE html>
<html>
<head>
<title>Property Deal Scanner</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
margin:10px;
background:#00ff9c;
border:none;
cursor:pointer;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.score{
font-size:28px;
color:#00ff9c;
}

</style>

</head>

<body>

<h1>Property Deal Scanner</h1>

<h3>Add Property</h3>

<input id="address" placeholder="Address">
<input id="area" placeholder="Area">
<input id="price" placeholder="Price">
<input id="sqft" placeholder="Sqft">

<br>

<button onclick="scoreDeal()">Score Deal</button>

<div id="results"></div>

<script>

const benchmarks = {
camden:1000,
islington:950,
battersea:950,
greenwich:800,
leyton:650
}

function scoreDeal(){

let address=document.getElementById("address").value
let area=document.getElementById("area").value.toLowerCase()
let price=parseFloat(document.getElementById("price").value)
let sqft=parseFloat(document.getElementById("sqft").value)

let ppsf=price/sqft
let benchmark=benchmarks[area] || 900

let discount=((benchmark-ppsf)/benchmark)*100

let score=Math.min(100,Math.max(0,discount*4+50))

let html=

`<div class="card">

<h2>${address}</h2>

<p>Price: £${price.toLocaleString()}</p>
<p>Size: ${sqft} sqft</p>

<p>£/sqft: £${Math.round(ppsf)}</p>
<p>Area benchmark: £${benchmark}</p>

<p>Discount: ${discount.toFixed(1)}%</p>

<p class="score">Deal Score: ${score.toFixed(0)}</p>

</div>`

document.getElementById("results").innerHTML=html

}

</script>

</body>

</html>
